<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your plans</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>🌷 Your plans</h1>
  <div class="subtitle">you can do more than you think.</div>

  <div class="months-bar" id="monthsBar"></div>

  <div class="add-panel">
    <input type="text" id="taskInput" placeholder="Что нужно сделать? Например: подготовить отчет, купить цветы..." />
    <button id="addButton">+ Добавить задачу</button>
  </div>

  <div class="tasks-header">
    <h2 id="monthTitle">📅 Планы</h2>
    <div class="counter" id="counter">0 задач</div>
  </div>

  <div id="tasksContainer" class="tasks-list"></div>
  <div class="info-note">💡 Совет: дважды кликните по тексту задачи, чтобы отредактировать. Выберите месяц в списке и нажмите "Переместить"</div>
  <footer>✧ Все данные сохраняются автоматически ✧</footer>
</div>

<script src="script.js"></script>
</body>
</html>
